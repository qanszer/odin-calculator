<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="brief description about the website. this text matters because it often appears in Google search results under your page title, so it helps people decide whether to click on your site.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script src="script.js" defer></script>
    <title></title>
</head>
<body>
    <div class="container">
        <div class="titlebar">
            <button class="undo">Undo</button>
            <button class="modes">Basic</button>
            <div class="titlebar-buttons">
                <button class="minimize"></button>
                <button class="maximize"></button>
                <button class="exit"></button>
            </div>
        </div>
        <div class="history">
            <div class="operation">999</div>
            <div class="equals">=</div>
            <div class="result">000</div>
        </div>
        <div class="output">
            1000
        </div>
        <div class="input">
            <button class="clear"></button>
            <button class="open-parenthesis">(</button>
            <button class="close-parenthesis">)</button>
            <button class="modulo">mod</button>
            <button class="pi">pi</button>
            <button class="7">7</button>
            <button class="8">8</button>
            <button class="9">9</button>
            <button class="divide">divide</button>
            <button class="root">root</button>
            <button class="4">4</button>
            <button class="5">5</button>
            <button class="6">6</button>
            <button class="multiply"></button>
            <button class="square"></button>
            <div class="lower-buttons">
                <button class="1">1</button>
                <button class="2">2</button>
                <button class="3">3</button>
                <button class="minus">-</button>
                <button class="0">0</button>
                <button class="decimal">.</button>
                <button class="percentage">%</button>
                <button class="add">+</button>
            </div>
            <button class="equals">=</button>
        </div>
    </div>
</body>
</html>
