<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="brief description about the website. this text matters because it often appears in Google search results under your page title, so it helps people decide whether to click on your site.">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title></title>
</head>
<body>
    <div class="container">
        <div class="windowbar">
            <button class="undo boxed-windowbar-button">Undo</button>
            <button class="modes boxed-windowbar-button">
                Basic
                <img src="./assets/chevron-down.svg">
            </button>
            <div class="windowbar-buttons">
                <button class="minimize circled-windowbar-button"><img src="./assets/minimize.svg" alt="minimize"></button>
                <button class="maximize circled-windowbar-button"><img src="./assets/maximize.svg" alt="maximize"></button>
                <button class="exit circled-windowbar-button"><img src="./assets/exit.svg" alt="exit"></button>
            </div>
        </div>
        <div class="history">
            <div class="operation-display">999</div>
            <div class="equals">=</div>
            <div class="result">000</div>
        </div>
        <div class="output">
            <div class="calculation-result"></div>
            <div class="error-display">Invalid expression</div>
        </div>
        <div class="input">
            <div class="first-row">
                <button class="key clear skip"><img src="./assets/backspace.svg" alt="clear input"></button>
                <button class="key open-parenthesis operator">(</button>
                <button class="key close-parenthesis operator">)</button>
                <button class="key modulo">mod</button>
                <button class="key pi operator">π</button>
            </div>
            <div class="second-row">
                <button class="key number 7">7</button>
                <button class="key number 8">8</button>
                <button class="key number 9">9</button>
                <button class="key divide operator">÷</button>
                <button class="key root operator">√</button>
            </div>
            <div class="third-row">
                <button class="key number 4">4</button>
                <button class="key number 5">5</button>
                <button class="key number 6">6</button>
                <button class="key multiply operator">×</button>
                <button class="key square">x²</button>
            </div>
            
            <div class="bottom-buttons">
                <div class="bottom-left-buttons">
                    <div class="fourth-row">
                        <button class="key number 1">1</button>
                        <button class="key number 2">2</button>
                        <button class="key number 3">3</button>
                        <button class="key minus operator">-</button>
                    </div>
                    <div class="fifth-row">
                        <button class="key number 0">0</button>
                        <button class="key decimal operator">.</button>
                        <button class="key percentage operator">%</button>
                        <button class="key add operator">+</button>
                    </div>
                </div>
                <div class="bottom-right-button">
                    <button class="key equals skip">=</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
